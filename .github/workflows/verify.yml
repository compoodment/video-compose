name: verify

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Compile Python tools
        run: python3 -m compileall tools
      - name: Validate examples
        run: |
          python3 tools/vidkit-compose.py --validate-only examples/vidkit.example.json
          python3 tools/vidkit-compose.py --validate-only examples/vidkit.motion-example.json
          python3 tools/vidkit-compose.py --validate-only examples/vidkit.lower-third-example.json
          python3 tools/vidkit-compose.py --validate-only examples/vidkit.motion-polish-example.json
          python3 tools/vidkit-compose.py --validate-only examples/vidkit.animation-presets-example.json
      - name: Run behavioral self-tests
        run: python3 tools/vidkit-selftest.py
      - name: Render and probe templates
        run: python3 tools/vidkit-verify.py
      - name: Upload verification artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vidkit-verify
          path: artifacts/vidkit/verify
